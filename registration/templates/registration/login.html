<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}" />
  </head>
  <body>
    <header class="genre-header">
      <div class="genre-header-inner">
        <a class="genre-brand" href="{% url 'genre_list_page' %}">Cinema2 · Genres</a>
        <nav class="genre-nav genre-nav-end" aria-label="Genres">
          <a href="{% url 'genre_list_page' %}">All genres</a>
          {% if user.is_authenticated %}
          <a href="{% url 'genre_create_page' %}">New genre</a>
          {% endif %}
          {% include "includes/_auth_corner.html" %}
        </nav>
      </div>
    </header>
    <main class="genre-main">
      <h1>Login</h1>
      {% if form.errors %}
      <p>Your username and password didn't match. Please try again.</p>
      {% endif %}
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
      </form>
    </main>
  </body>
</html>
